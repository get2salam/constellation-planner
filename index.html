<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Constellation Planner</title>
    <meta
      name="description"
      content="A local-first strategy map where projects become stars and dependencies become visible paths."
    />
    <link rel="stylesheet" href="./styles/tokens.css" />
    <link rel="stylesheet" href="./styles/app.css" />
    <link rel="stylesheet" href="./styles/sky.css" />
    <link rel="stylesheet" href="./styles/list.css" />
    <link rel="stylesheet" href="./styles/controls.css" />
    <link rel="stylesheet" href="./styles/insights.css" />
    <link rel="stylesheet" href="./styles/roadmap.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar card">
        <div class="brand">
          <h1>Constellation Planner</h1>
          <p>Local-first strategy mapping for ambitious projects.</p>
        </div>
        <div></div>
        <div class="toolbar">
          <button class="btn" data-action="set-view" data-view="sky">Sky</button>
          <button class="btn" data-action="set-view" data-view="roadmap">Roadmap</button>
          <button class="btn" data-action="import">Import</button>
          <button class="btn" data-action="export">Export</button>
          <button class="btn" data-action="reset-sample">Re-seed sample</button>
          <button class="btn" data-action="clear-map">Clear map</button>
          <button class="btn btn-primary" data-action="new-star">New star</button>
          <input id="import-file" type="file" accept=".json,application/json" hidden />
        </div>
      </header>

      <section class="hero">
        <article class="hero-copy card">
          <h2 data-role="map-title">Turn your strategy into a navigable sky.</h2>
          <p data-role="map-note">
            Plot initiatives as stars, connect dependencies as routes, and see
            where your strongest bets cluster around the mission.
          </p>
        </article>
        <aside class="hero-stats card">
          <h3>At a glance</h3>
          <div class="summary-grid">
            <div class="stat">
              <strong data-role="stars-count">0</strong>
              <span>stars</span>
            </div>
            <div class="stat">
              <strong data-role="links-count">0</strong>
              <span>links</span>
            </div>
            <div class="stat">
              <strong data-role="active-bets">0</strong>
              <span>active bets</span>
            </div>
            <div class="stat">
              <strong data-role="top-priority">—</strong>
              <span>top priority</span>
            </div>
          </div>
        </aside>
      </section>

      <section class="controls card">
        <label class="control search">
          <span>Search</span>
          <input type="search" placeholder="Search stars and notes…" data-field="search" />
        </label>
        <label class="control">
          <span>Kind</span>
          <select data-field="kindFilter">
            <option value="all">All kinds</option>
          </select>
        </label>
        <label class="control">
          <span>Status</span>
          <select data-field="statusFilter">
            <option value="all">All stages</option>
          </select>
        </label>
      </section>

      <section class="workspace">
        <article class="panel card placeholder" data-role="canvas"></article>
        <article class="panel card placeholder" data-role="ledger"></article>
      </section>

      <section class="insights" data-role="insights"></section>
    </main>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
